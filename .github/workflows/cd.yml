name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: gatsby

      - name: Install dependencies
        run: yarn install

      - name: Install Playwright Chromium (for Mermaid rendering)
        run: yarn node_modules/.bin/playwright install --with-deps chromium

      - name: Build with Gatsby
        env:
          PREFIX_PATHS: "true"
          CHROMIUM_DIR: ${{ env.CHROMIUM_DIR }}
        run: |
          CHROMIUM_DIR=$(ls -d $HOME/.cache/ms-playwright/chromium-* | sort -V | tail -n 1)
          echo "CHROMIUM_DIR=$CHROMIUM_DIR" >> $GITHUB_ENV
          yarn clean
          yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
